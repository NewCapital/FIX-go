# FIX Mainnet Configuration
# ============================
# This is the primary configuration file for FIX mainnet.
# All values can be overridden via environment variables with FIX_ prefix.
# Example: FIX_RPC_PASSWORD overrides rpc.password

# ==========================================
# Network Settings
# ==========================================
network:
  # P2P port for peer connections (default: 17464)
  port: 17464

  # Seed nodes for initial peer discovery (mirrors GetDefaultSeeds(NetworkMainnet)
  # in internal/config/defaults.go). Refreshed 2026-04-15.
  seeds:
    - 45.77.206.161:17464
    - 45.77.64.171:17464
    - 207.148.67.25:17464
    - 45.32.36.145:17464
    - 108.61.221.138:17464
    - 149.28.255.224:17464
    - 207.246.73.248:17464
    - 216.238.117.200:17464
    - 149.28.166.62:17464
    - 65.20.68.219:17464
    - 158.247.254.3:17464
    - 139.84.245.134:17464

  # Maximum number of peer connections (default: 125)
  maxPeers: 125

  # Run on testnet (default: false)
  testNet: false

  # Address to listen for P2P connections (0.0.0.0 = all interfaces)
  listenAddr: "0.0.0.0"

  # External IP address (leave empty for auto-detection)
  externalIP: ""

  # Connection timeout in seconds (default: 30)
  timeout: 30

  # Keep-alive interval in seconds (default: 60)
  keepAlive: 60

  # Maximum bandwidth in bytes/sec (0 = unlimited)
  maxBandwidth: 0

  # SOCKS5 proxy for all connections (empty = disabled)
  proxy: ""

  # Separate SOCKS5 proxy for Tor connections (empty = use proxy)
  onionProxy: ""

  # Only connect via specific network (ipv4, ipv6, onion, or empty for all)
  onlyNet: ""

# ==========================================
# RPC Server Settings
# ==========================================
rpc:
  # Enable JSON-RPC server (default: true)
  enabled: true

  # RPC server port (default: 17465)
  port: 17465

  # RPC server bind address (127.0.0.1 = localhost only)
  host: "127.0.0.1"

  # RPC authentication username (REQUIRED for production)
  # Generate secure credentials and store in environment variables
  username: ""

  # RPC authentication password (REQUIRED for production)
  password: ""

  # IP addresses allowed to connect to RPC
  allowedIPs:
    - "127.0.0.1"
    - "::1"

  # Maximum concurrent RPC connections (default: 100)
  maxClients: 100

  # RPC request timeout in seconds (default: 30)
  timeout: 30

  # Number of RPC worker threads (default: 4)
  threads: 4

# ==========================================
# Wallet Settings
# ==========================================
wallet:
  # Enable wallet functionality (default: true)
  enabled: true

  # Wallet file name (default: wallet.dat)
  file: "wallet.dat"

  # Pre-generated key pool size (default: 100)
  keyPool: 100

  # Default transaction fee per kB in FIX (default: 0.0001)
  txFee: 0.0001

  # Maximum transaction fee in FIX (default: 0.10)
  maxTxFee: 0.10

  # Spend unconfirmed change (default: true)
  spendUnconfirmedChange: true

  # Use HD wallet (BIP32/44) (default: true)
  useHD: true

  # Rescan blockchain on startup (default: false)
  rescan: false

# ==========================================
# Staking Settings
# ==========================================
staking:
  # Enable staking (default: false)
  enabled: false

  # Reserve balance not used for staking in FIX (default: 0)
  reserveBalance: 0

  # Minimum stake amount in satoshis (default: 1200000000000 = 12000 FIX)
  minAmount: 1200000000000

# ==========================================
# Masternode Settings
# ==========================================
# Masternode tiers and collateral requirements:
#   Bronze:   1,000,000 FIX   (10% block reward)
#   Silver:   5,000,000 FIX   (20% block reward)
#   Gold:    20,000,000 FIX   (30% block reward)
#   Platinum: 100,000,000 FIX (40% block reward)
masternode:
  # Enable masternode mode (default: false)
  enabled: false

  # Masternode private key (generate with: fix-cli createmasternodekey)
  privateKey: ""

  # External service address (IP:port) for masternode
  serviceAddr: ""

  # Path to masternode.conf for remote MN entries (default: masternode.conf)
  mnConf: "masternode.conf"

  # Lock UTXOs from masternode.conf (default: true)
  mnConfLock: true

# ==========================================
# Logging Settings
# ==========================================
logging:
  # Log level (debug, info, warn, error)
  level: "info"

  # Log format (text, json)
  format: "text"

  # Log output file path
  output: "./fix.log"

  # Debug categories (comma-separated): net, rpc, mempool, consensus, p2p, wallet
  debugCategories: ""
